name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy-web:
    name: Deploy Next.js Web App
    runs-on: ubuntu-latest
    steps:
      - name: Debug network connectivity
        run: |
          echo "Testing connectivity to Alibaba Cloud ECS..."
          nc -zv -w 10 ${{ secrets.ALIBABA_HOST }} 22 || echo "Port 22 unreachable from GitHub runner"

      - name: Deploy to Alibaba Cloud ECS via SSH
        uses: appleboy/ssh-action@v1
        env:
          WORKER_API_URL: ${{ vars.WORKER_API_URL }}
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
          PORT: ${{ vars.PORT || '3000' }}
        with:
          host: ${{ secrets.ALIBABA_HOST }}
          username: ${{ secrets.ALIBABA_USER }}
          key: ${{ secrets.ALIBABA_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          envs: WORKER_API_URL,WORKER_API_KEY,PORT
          script: |
            echo "Writing environment variables..."
            cat > /root/roadblock/.env.local << EOF
            NODE_ENV=production
            PORT=$PORT
            WORKER_API_URL=$WORKER_API_URL
            WORKER_API_KEY=$WORKER_API_KEY
            EOF
            /root/deploy-web.sh

  deploy-worker:
    name: Deploy FastAPI Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy main.py to GPU ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.ALIBABA_WORKER_HOST }}
          username: ${{ secrets.ALIBABA_USER }}
          key: ${{ secrets.ALIBABA_SSH_KEY }}
          source: "alibaba/main.py"
          target: "/root/main.py"
          overwrite: true

      - name: Restart roadblock-worker service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.ALIBABA_WORKER_HOST }}
          username: ${{ secrets.ALIBABA_USER }}
          key: ${{ secrets.ALIBABA_SSH_KEY }}
          script: |
            echo "Restarting roadblock-worker..."
            systemctl restart roadblock-worker
            sleep 2
            systemctl status roadblock-worker --no-pager