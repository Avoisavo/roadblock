name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Alibaba Cloud ECS via SSH
        uses: appleboy/ssh-action@v1
        env:
          WORKER_API_URL: ${{ vars.WORKER_API_URL }}
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
          PORT: ${{ vars.PORT || '3000' }}
        with:
          host: ${{ secrets.ALIBABA_HOST }}
          username: ${{ secrets.ALIBABA_USER }}
          key: ${{ secrets.ALIBABA_SSH_KEY }}
          envs: WORKER_API_URL,WORKER_API_KEY,PORT
          script: |
            echo "Writing environment variables..."
            cat > /root/roadblock/.env.local << EOF
            NODE_ENV=production
            PORT=$PORT
            WORKER_API_URL=$WORKER_API_URL
            WORKER_API_KEY=$WORKER_API_KEY
            EOF
            /root/deploy-web.sh